base_config: configs/config.yaml

whisper_baseline:
  model:
    # 單獨訓練 Whisper-medium，作為不使用低秩適應的基線模型。
    model_name_or_path: openai/whisper-medium
    language: zh
    task: transcribe
    freeze_encoder: true
    unfreeze_encoder_last_n_layers: 4
    train_decoder: false
    gradient_checkpointing: true
    gradient_checkpointing_use_reentrant: false

  data:
    prepared_dir: data/processed/common_voice
    train_tsv: data/processed/common_voice/train.tsv
    eval_tsv: data/processed/common_voice/dev.tsv
    text_column: target_text
    audio_path_column: audio_path
    language_label_column: language_label
    raw_sentence_column: raw_sentence
    target_script_column: target_script
    romanization_column: romanization_text
    train_split: train
    eval_split: dev

  training:
    output_dir: artifacts/baselines/whisper_medium_ft
    max_train_samples:
    max_eval_samples:
    num_train_epochs: 10.0
    learning_rate: 1.0e-5
    warmup_steps: 500
    per_device_train_batch_size: 4
    per_device_eval_batch_size: 4
    gradient_accumulation_steps: 4
    eval_strategy: steps
    eval_steps: 500
    save_steps: 500
    logging_steps: 25
    generation_max_length: 192
    generation_num_beams: 1
    fp16: true
    save_total_limit: 2
    load_best_model_at_end: true
    metric_for_best_model: cer
    greater_is_better: false
    report_to:
      - wandb
    wandb_project: whisper-tw
    run_name: whisper-medium-baseline
    wandb_log_model: false
    dataloader_num_workers: 2
    disable_tqdm: false

  early_stopping:
    enabled: true
    patience: 3
    threshold: 0.0

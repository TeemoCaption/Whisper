  - name: whisper_small_ft_zh_tw
    enabled: true
    table: zh_tw_baselines
    type: hf_whisper
    model_name_or_path: artifacts/baselines/whisper_small_ft_zh_tw_h100/final
    language_filter: zh-TW
    display_name: Whisper-small 微調
    base_model: Whisper-small

finetune_defaults:
  num_train_epochs: 15.0
  learning_rate: 5.0e-6
  lr_scheduler_type: linear_floor
  min_lr_ratio: 0.2
  weight_decay: 0.01
  batch_size: 32
  device: cuda

finetune_jobs:
  - name: whisper_small_ft_zh_tw
    language: zh-TW
    model_name_or_path: openai/whisper-small
    output_dir: artifacts/baselines/whisper_small_ft_zh_tw_h100
    learning_rate: 1.0e-6
    min_lr_ratio: 0.1
    warmup_steps: 1000
    weight_decay: 0.05

  - name: whisper_medium_ft_zh_tw
    language: zh-TW
    model_name_or_path: openai/whisper-medium
    output_dir: artifacts/baselines/whisper_medium_ft_zh_tw_h100
    learning_rate: 4.0e-6
    min_lr_ratio: 0.15
    warmup_steps: 700
    weight_decay: 0.015

  - name: whisper_large_v3_turbo_ft_zh_tw
    language: zh-TW
    model_name_or_path: openai/whisper-large-v3-turbo
    output_dir: artifacts/baselines/whisper_large_v3_turbo_ft_zh_tw_h100
    learning_rate: 2.0e-6
    min_lr_ratio: 0.1
    warmup_steps: 900
    weight_decay: 0.03

  - name: whisper_small_ft_nan_tw
    language: nan-tw
    model_name_or_path: openai/whisper-small
    output_dir: artifacts/baselines/whisper_small_ft_nan_tw_h100
    learning_rate: 3.0e-6
    min_lr_ratio: 0.2
    warmup_steps: 800
    weight_decay: 0.02

  - name: whisper_medium_ft_nan_tw
    language: nan-tw
    model_name_or_path: openai/whisper-medium
    output_dir: artifacts/baselines/whisper_medium_ft_nan_tw_h100
    learning_rate: 2.0e-6
    min_lr_ratio: 0.1
    warmup_steps: 1000
    weight_decay: 0.03

  - name: whisper_large_v3_turbo_ft_nan_tw
    language: nan-tw
    model_name_or_path: openai/whisper-large-v3-turbo
    output_dir: artifacts/baselines/whisper_large_v3_turbo_ft_nan_tw_h100
    learning_rate: 4.0e-6
    min_lr_ratio: 0.2
    warmup_steps: 700
    weight_decay: 0.015

adalora_jobs:
  - name: adalora_small_zh_tw
    language: zh-TW
    model_name_or_path: openai/whisper-small
    output_dir: artifacts/models/whisper_small_adalora_zh_tw_h100
    run_name: whisper-small-adalora-zh-tw-h100

  - name: adalora_medium_zh_tw
    language: zh-TW
    model_name_or_path: openai/whisper-medium
    output_dir: artifacts/models/whisper_medium_adalora_zh_tw_h100
    run_name: whisper-medium-adalora-zh-tw-h100

  - name: adalora_large_v3_turbo_zh_tw
    language: zh-TW
    model_name_or_path: openai/whisper-large-v3-turbo
    output_dir: artifacts/models/whisper_large_v3_turbo_adalora_zh_tw_h100
    run_name: whisper-large-v3-turbo-adalora-zh-tw-h100

  - name: adalora_small_nan_tw
    language: nan-tw
    model_name_or_path: openai/whisper-small
    output_dir: artifacts/models/whisper_small_adalora_nan_tw_h100
    run_name: whisper-small-adalora-nan-tw-h100

  - name: adalora_medium_nan_tw
    language: nan-tw
    model_name_or_path: openai/whisper-medium
    output_dir: artifacts/models/whisper_medium_adalora_nan_tw_h100
    run_name: whisper-medium-adalora-nan-tw-h100

  - name: adalora_large_v3_turbo_nan_tw
    language: nan-tw
    model_name_or_path: openai/whisper-large-v3-turbo
    output_dir: artifacts/models/whisper_large_v3_turbo_adalora_nan_tw_h100
    run_name: whisper-large-v3-turbo-adalora-nan-tw-h100

router_jobs:
  - name: router_whisper_small
    model_name_or_path: openai/whisper-small
    output_dir: artifacts/models/contrastive_router_whisper_small_h100
    device: cuda

  - name: router_whisper_medium
    model_name_or_path: openai/whisper-medium
    output_dir: artifacts/models/contrastive_router_whisper_medium_h100
    device: cuda

  - name: router_whisper_large_v3_turbo
    model_name_or_path: openai/whisper-large-v3-turbo
    output_dir: artifacts/models/contrastive_router_whisper_large_v3_turbo_h100
    device: cuda

baselines:
  - name: router_metrics_whisper_small
    enabled: true
    table: router_test
    type: router_metrics
    model_name_or_path: openai/whisper-small
    router_checkpoint: artifacts/models/contrastive_router_whisper_small_h100/contrastive_router.pt
    display_name: Whisper-small 對比式查詢路由器
    base_model: Whisper-small
    training_method: 單獨路由器驗證
    test_data: zh-TW + nan-tw test
    device: cuda

  - name: router_metrics_whisper_medium
    enabled: true
    table: router_test
    type: router_metrics
    model_name_or_path: openai/whisper-medium
    router_checkpoint: artifacts/models/contrastive_router_whisper_medium_h100/contrastive_router.pt
    display_name: Whisper-medium 對比式查詢路由器
    base_model: Whisper-medium
    training_method: 單獨路由器驗證
    test_data: zh-TW + nan-tw test
    device: cuda

  - name: router_metrics_whisper_large_v3_turbo
    enabled: true
    table: router_test
    type: router_metrics
    model_name_or_path: openai/whisper-large-v3-turbo
    router_checkpoint: artifacts/models/contrastive_router_whisper_large_v3_turbo_h100/contrastive_router.pt
    display_name: Whisper-large-v3-turbo 對比式查詢路由器
    base_model: Whisper-large-v3-turbo
    training_method: 單獨路由器驗證
    test_data: zh-TW + nan-tw test
    device: cuda

  - name: whisper_small_zh_tw
    enabled: true
    table: zh_tw_baselines
    type: hf_whisper
    model_name_or_path: openai/whisper-small
    language_filter: zh-TW
    display_name: Whisper-small
    base_model: Whisper-small
    training_method: 未微調
    test_data: zh-TW test
    trainable_parameters: 0
    device: cuda

  - name: whisper_medium_zh_tw
    enabled: true
    table: zh_tw_baselines
    type: hf_whisper
    model_name_or_path: openai/whisper-medium

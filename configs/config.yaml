whisper_train:
  model:
    # 固定使用 Whisper-medium 作為共享底座。
    model_name_or_path: openai/whisper-medium
    language: zh
    task: transcribe
    freeze_encoder: true
    unfreeze_encoder_last_n_layers: 4
    train_decoder: false
    gradient_checkpointing: true
    gradient_checkpointing_use_reentrant: false

  peft:
    enabled: true
    # 本專案只使用 adalora 對應自適應低秩適應。
    method: adalora
    # language 是每語言一組轉接模組；本檔作為語言 adapter 共用基底。
    adapter_scope: language
    active_adapter:
    active_language:
    language_adapters:
      zh-TW: zh_tw
      nan-tw: nan_tw
    save_all_adapters: false
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - out_proj
      - fc1
      - fc2
    bias: none
    modules_to_save: []
    adalora:
      init_r: 32
      target_r: 16
      beta1: 0.85
      beta2: 0.85
      tinit: 200
      tfinal: 1000
      deltaT: 10
      lora_alpha: 64
      lora_dropout: 0.05
      total_step: 12000

  data:
    root: data
    prepared_dir: data/processed/common_voice
    train_tsv: data/processed/common_voice/train.tsv
    eval_tsv: data/processed/common_voice/dev.tsv
    test_tsv: data/processed/common_voice/test.tsv
    text_column: target_text
    audio_path_column: audio_path
    language_label_column: language_label
    raw_sentence_column: raw_sentence
    target_script_column: target_script
    romanization_column: romanization_text
    train_split: train
    eval_split: dev
    test_split: test
    sample_rate: 16000
    max_audio_seconds: 30.0
    text_normalization:
      enabled: true
      apply_nfkc: true
      remove_punctuation: false
      remove_whitespace: true

  training:
    # 8GB VRAM 預設：降低單步批次，靠梯度累積維持有效批次。
    output_dir: artifacts/models/whisper_medium_adalora_8gb
    num_train_epochs: 10.0
    learning_rate: 1.0e-5
    lr_scheduler_type: linear
    warmup_steps: 500
    per_device_train_batch_size: 4
    per_device_eval_batch_size: 1
    gradient_accumulation_steps: 4
    eval_strategy: epoch
    save_strategy: epoch
    logging_steps: 100
    eval_accumulation_steps: 16
    torch_empty_cache_steps: 100
    eval_do_concat_batches: false
    include_inputs_for_metrics: false
    predict_with_generate: false
    generation_max_length: 96
    generation_num_beams: 1
    fp16: true
    save_total_limit: 2
    load_best_model_at_end: true
    metric_for_best_model: eval_loss
    greater_is_better: false
    report_to:
      - wandb
    wandb_project: whisper-tw
    run_name: whisper-medium-adalora-8gb
    wandb_log_model: false
    dataloader_num_workers: 1
    dataloader_pin_memory: true
    dataloader_persistent_workers: true
    dataloader_prefetch_factor: 2
    tf32: true
    disable_tqdm: false
    warmup_first_batch: true

  contrastive_router:
    enabled: true
    labels:
      - zh-TW
      - nan-tw
    output_dir: artifacts/models/contrastive_router_8gb
    train_split: train
    eval_split: dev
    test_split: test
    num_train_epochs: 5.0
    learning_rate: 1.0e-4
    warmup_steps: 100
    weight_decay: 0.02
    max_grad_norm: 1.0
    pooling: attention
    attention_hidden_size: 128
    embedding_size: 128
    hidden_ratio: 0.25
    dropout: 0.2
    temperature: 0.1
    label_smoothing: 0.05
    margin: 0.2
    margin_loss_weight: 0.1
    per_device_train_batch_size: 4
    per_device_eval_batch_size: 4
    dataloader_num_workers: 1
    dataloader_pin_memory: true
    dataloader_persistent_workers: true
    fp16: true
    bf16: false
    tf32: true
    logging_steps: 25
    log_step_loss: false
    disable_tqdm: false
    early_stopping:
      enabled: true
      patience: 1
      min_delta: 0.0
      metric: macro_f1
    report_to:
      - wandb
    wandb_project: whisper-tw
    run_name: whisper-medium-contrastive-router-8gb

  early_stopping:
    enabled: true
    patience: 2
    threshold: 0.0

whisper_train:
  model:
    # 與 8GB 設定保持相同模型與方法，只調整資源相關欄位。
    model_name_or_path: openai/whisper-medium
    language: zh
    task: transcribe
    freeze_encoder: true
    unfreeze_encoder_last_n_layers: 4
    train_decoder: false
    gradient_checkpointing: false
    gradient_checkpointing_use_reentrant: false

  peft:
    enabled: true
    method: adalora
    adapter_scope: language
    active_adapter:
    active_language:
    language_adapters:
      zh-TW: zh_tw
      nan-tw: nan_tw
    save_all_adapters: false
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - out_proj
      - fc1
      - fc2
    bias: none
    modules_to_save: []
    adalora:
      init_r: 48
      target_r: 24
      beta1: 0.85
      beta2: 0.85
      tinit: 200
      tfinal: 1000
      deltaT: 10
      lora_alpha: 96
      lora_dropout: 0.12
      total_step: 12000

  language_training_defaults:
    zh-TW:
      learning_rate: 1.0e-5
      lr_scheduler_type: linear_floor
      min_lr_ratio: 0.2
      warmup_steps: 500
      num_train_epochs: 10.0
    nan-tw:
      learning_rate: 1.8e-5
      lr_scheduler_type: linear_floor
      min_lr_ratio: 0.35
      warmup_steps: 350
      weight_decay: 0.015
      num_train_epochs: 20.0

  data:
    root: data
    prepared_dir: data/processed/common_voice
    train_tsv: data/processed/common_voice/train.tsv
    eval_tsv: data/processed/common_voice/dev.tsv
    test_tsv: data/processed/common_voice/test.tsv
    text_column: target_text
    audio_path_column: audio_path
    language_label_column: language_label
    raw_sentence_column: raw_sentence
    target_script_column: target_script
    romanization_column: romanization_text
    train_split: train
    eval_split: dev
    test_split: test
    sample_rate: 16000
    max_audio_seconds: 30.0
    text_normalization:
      enabled: true
      apply_nfkc: true
      remove_punctuation: false
      remove_whitespace: true

  training:
    # H100 建議設定：模型與低秩方法不變，只提高吞吐。
    output_dir: artifacts/models/whisper_medium_adalora_h100
    num_train_epochs: 15.0
    learning_rate: 1.0e-5
    lr_scheduler_type: linear
    warmup_steps: 500
    per_device_train_batch_size: 32
    per_device_eval_batch_size: 32
    gradient_accumulation_steps: 4
    eval_strategy: epoch
    save_strategy: epoch
    logging_steps: 25
    generation_max_length: 64
    generation_num_beams: 1
    predict_with_generate: false
    fp16: false
    bf16: true
    tf32: true
    save_total_limit: 2
    load_best_model_at_end: true
    metric_for_best_model: eval_loss
    greater_is_better: false
    eval_cer_enabled: true
    eval_cer_max_samples: 1000
    eval_cer_batch_size: 16
    spec_augment:
      enabled: true
      mask_time_prob: 0.03
      mask_time_length: 10
      mask_feature_prob: 0.02
      mask_feature_length: 8
    report_to:
      - wandb
    wandb_project: whisper-tw
    run_name: whisper-medium-adalora-h100
    wandb_log_model: false
    dataloader_num_workers: 0
    dataloader_pin_memory: true
    dataloader_persistent_workers: false
    dataloader_prefetch_factor: null
    disable_tqdm: false

  contrastive_router:
    enabled: true
    labels:
      - zh-TW
      - nan-tw
    output_dir: artifacts/models/contrastive_router_h100
    train_split: train
    eval_split: dev
    test_split: test
    num_train_epochs: 10.0
    learning_rate: 1.0e-4
    lr_scheduler_type: linear_floor
    min_lr_ratio: 0.2
    warmup_steps: 100
    weight_decay: 0.02
    max_grad_norm: 1.0
    pooling: attention
    attention_hidden_size: 256
    embedding_size: 128
    hidden_ratio: 0.25
    dropout: 0.2
    temperature: 0.1
    label_smoothing: 0.05
    margin: 0.2
    margin_loss_weight: 0.1
    per_device_train_batch_size: 32
    per_device_eval_batch_size: 32
    gradient_accumulation_steps: 4
    feature_cache_enabled: false
    feature_cache_dir: artifacts/models/contrastive_router_h100/feature_cache
    feature_cache_batch_size: 64
    dataloader_num_workers: 0
    dataloader_pin_memory: true
    dataloader_persistent_workers: false
    dataloader_prefetch_factor: null
    fp16: false
    bf16: true
    tf32: true
    logging_steps: 25
    log_step_loss: false
    disable_tqdm: false
    early_stopping:
      enabled: true
      patience: 1
      min_delta: 0.0
      metric: macro_f1
    report_to:
      - wandb
    wandb_project: whisper-tw
    run_name: whisper-medium-contrastive-router-h100

  early_stopping:
    enabled: true
    patience: 2
    min_epochs: 5
    threshold: 0.0
